title: "Research"
description: "Writeups and research."
url: "https://e1a.nl"
baseurl: ""

timezone: "Europe/Amsterdam"

markdown: kramdown
highlighter: rouge
permalink: pretty

plugins:
  - jekyll-feed

feed:
  collections:
    blog:
      path: /blog/feed.xml

collections:
  blog:
    output: true
    permalink: /blog/:name/

defaults:
  - scope:
      path: ""
      type: "blog"
    values:
      layout: "blog_post"

kramdown:
  input: GFM
  syntax_highlighter: rouge

excerpt_separator: "<!--more-->"